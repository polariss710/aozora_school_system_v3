name: Staging operational monitor

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: staging-operational-monitor
  cancel-in-progress: false

jobs:
  smoke:
    name: Check staging environment boundaries
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run operational smoke probe
        run: node scripts/staging/operational-smoke.mjs
