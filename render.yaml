services:
  - type: web
    name: aozora-school-system-v3-api-dev
    runtime: node
    plan: free
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --dir apps/api exec prisma generate && pnpm build:api
    startCommand: pnpm --dir apps/api exec prisma migrate deploy && pnpm --dir apps/api start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: http://localhost:5173,http://127.0.0.1:5173,https://aozora-school-system-v3-demo.onrender.com
      - key: OPERATIONAL_BUSINESS_ENTITY_CODE
        value: aozora_school
      - key: SCHOOL_RUNTIME_ENV
        value: dev
      - key: CASH_INTEGRATION_MODE
        sync: false
      - key: CASH_DEV_SUPABASE_URL
        sync: false
      - key: CASH_DEV_SERVICE_ROLE_KEY
        sync: false
      - key: CASH_DEV_USER_ID
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
